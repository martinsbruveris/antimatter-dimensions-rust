<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antimatter Dimensions</title>
    <!-- Vendored verbatim from the original game (public/stylesheets).
         Modern UI = styles.css + new-ui-styles.css; body class below
         selects the Modern default theme (t-normal s-base--dark).
         ORDER MATTERS: equal-specificity rules overlap across these files
         (e.g. vue-sfc-classes' base .l-hint-text top offset vs styles.css'
         achievement/challenge hint-text variants), so keep the original's
         cascade: head links in the original index.html order, then
         new-ui-styles.css last (the original injects that one at
         Modern-UI mount, after every head stylesheet). -->
    <link rel="stylesheet" href="/stylesheets/fontawesome/css/all.css">
    <link rel="stylesheet" href="/stylesheets/vue-sfc-classes.css">
    <link rel="stylesheet" href="/stylesheets/ad-slider-component.css">
    <link rel="stylesheet" href="/stylesheets/styles.css">
    <link rel="stylesheet" href="/stylesheets/time-studies.css">
    <link rel="stylesheet" href="/stylesheets/tooltips.css">
    <link rel="stylesheet" href="/stylesheets/new-ui-styles.css">
    <!-- Startup splash: static markup + inline CSS so it paints immediately,
         before the JS bundle loads (mirrors the original game's #loading).
         main.js hides it once the app has mounted. -->
    <style>
      #loading {
        width: 100%;
        height: 100%;
        position: absolute;
        z-index: 999;
        background: url("/images/loading.png") no-repeat;
        background-color: black;
        background-position-x: 50%;
        background-position-y: 50%;
        background-size: cover;
        opacity: 1;
        transition: opacity 0.4s ease;
      }
      #loading.is-hidden {
        opacity: 0;
        pointer-events: none;
      }
    </style>
</head>
<body class="t-normal s-base--dark">
    <div id="loading"></div>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
