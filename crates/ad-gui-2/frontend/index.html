<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antimatter Dimensions</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <!-- Header: Antimatter display -->
        <div class="c-prestige-button-container">
            <span>You have
                <span id="antimatter" class="c-game-header__antimatter">0</span>
                antimatter.
            </span>
            <div id="antimatter-per-sec" class="c-game-header__per-sec">
                You are getting 0 antimatter per second.
            </div>
            <div class="c-game-header__tickspeed-row">
                <span id="tickspeed-mult-info"></span>
                <span id="tickspeed-total-info"></span>
            </div>
        </div>

        <div class="c-separator"></div>

        <!-- Sacrifice + Max All row (modes-container) -->
        <div class="modes-container">
            <button id="btn-sacrifice" class="o-primary-btn o-primary-btn--sacrifice" style="display: none;">
                Dimensional Sacrifice
            </button>
            <button id="btn-max-all" class="o-primary-btn l-button-container" onclick="maxAll()">
                Max All (M)
            </button>
        </div>
        <div id="multiplier-text" class="multiplier-text"></div>

        <!-- Tickspeed row -->
        <div class="l-tickspeed-container">
            <div class="tickspeed-buttons">
                <button id="btn-tickspeed" class="o-primary-btn tickspeed-btn" onclick="buyTickspeed()">
                    Tickspeed Cost: 0
                </button>
                <button id="btn-max-tickspeed" class="o-primary-btn tickspeed-max-btn" onclick="buyMaxTickspeed()">
                    Buy Max
                </button>
            </div>
        </div>

        <div class="c-separator"></div>

        <!-- Dimensions -->
        <div id="dimensions" class="l-dimensions-container">
            <!-- Populated by JS -->
        </div>

        <div class="c-separator"></div>

        <!-- Prestige: Dim Boost + Galaxy -->
        <div class="resets-container">
            <div class="reset-container dimboost">
                <h4 id="dim-boost-info">Dimension Boost (0)</h4>
                <span id="dim-boost-req"></span>
                <button id="btn-dim-boost"
                    class="o-primary-btn o-primary-btn--new o-primary-btn--dimension-reset"
                    onclick="buyDimBoost()">
                    Reset your Dimensions to boost
                </button>
            </div>
            <div class="reset-container galaxy">
                <h4 id="galaxy-info">Antimatter Galaxies (0)</h4>
                <span id="galaxy-req"></span>
                <button id="btn-galaxy"
                    class="o-primary-btn o-primary-btn--new o-primary-btn--dimension-reset"
                    onclick="buyGalaxy()">
                    Reset your Dimensions and Boosts to increase Tickspeed power
                </button>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
